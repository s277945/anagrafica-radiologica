name: Docker Image

on:
  push:
    branches:
      - snapshot
      - stable
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.vars.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build WAR
        run: ./mvnw clean package -DskipTests

      - name: Compute image tag
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${GITHUB_REF_NAME}" = "snapshot" ]; then
            TAG="snapshot-${SHORT_SHA}"
          elif [ "${GITHUB_REF_NAME}" = "stable" ]; then
            TAG="stable-${SHORT_SHA}"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAG="release-${SHORT_SHA}"
          else
            TAG="${GITHUB_REF_NAME}-${SHORT_SHA}"
          fi

          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/anagrafica-radiologica:${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: docker build -t "${{ steps.vars.outputs.image }}" .

      - name: Push Docker image
        run: docker push "${{ steps.vars.outputs.image }}"
