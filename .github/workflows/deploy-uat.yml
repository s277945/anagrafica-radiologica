name: Deploy UAT

on:
  workflow_run:
    workflows:
      - Docker Image
    branches:
      - stable
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    environment: uat

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Compute image tag
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="stable-${SHORT_SHA}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/anagrafica-radiologica:${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy UAT via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.UAT_HOST }}
          username: ${{ secrets.UAT_USER }}
          key: ${{ secrets.UAT_SSH_KEY }}
          script: |
            cd ${{ secrets.UAT_DEPLOY_PATH }}

            echo "APP_IMAGE=${{ steps.vars.outputs.image }}" > .env

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose pull
            docker compose up -d
            docker image prune -f
