version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anagrafica_radiologica
      POSTGRES_USER: anagrafica
      POSTGRES_PASSWORD: anagrafica_pwd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anagrafica"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/anagrafica_radiologica
      SPRING_DATASOURCE_USERNAME: anagrafica
      SPRING_DATASOURCE_PASSWORD: anagrafica_pwd
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
