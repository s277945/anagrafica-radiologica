services:
  db:
    image: postgres:16-alpine
    container_name: anagrafica-radiologica-db-it
    environment:
      POSTGRES_DB: anagrafica_radiologica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anagrafica_radiologica"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anagrafica-radiologica-backend-it
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/anagrafica_radiologica
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_SERVLET_CONTEXT_PATH: /anagrafica
    ports:
      - "8080:8080"

  frontend:
    image: node:20-alpine
    container_name: anagrafica-radiologica-frontend-it
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend